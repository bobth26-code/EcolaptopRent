<!DOCTYPE html>

<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ================= BODY ================= */
body{
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#dbeafe,#f0f9ff,#ecfdf5);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    color:#111827;
}

/* Dark Mode */
body.dark{
    background:#0f172a;
    animation:none;
    color:#f1f5f9;
}

/* Background Animation */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= NAVBAR ================= */
.navbar{
    width:90%;
    margin:30px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    background:#ffffff;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    transition:all .35s ease;
    position:relative;
    z-index:1000;
}

.navbar.scrolled{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    margin:0;
    border-radius:0;
    padding:12px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

body.dark .navbar{
    background:#111827;
}

/* LEFT */
.nav-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.nav-left i{
    font-size:22px;
    color:#2563eb;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.nav-left h2{
    font-size:20px;
    font-weight:600;
}

/* RIGHT */
.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

/* ================= TOGGLE ================= */
.theme-toggle{
    background:transparent;
    border:none;
    cursor:pointer;
}

.slider-track{
    width:65px;
    height:34px;
    background:linear-gradient(135deg,#facc15,#f59e0b);
    border-radius:50px;
    position:relative;
    transition:.4s ease;
}

.slider-thumb{
    width:28px;
    height:28px;
    background:#ffffff;
    border-radius:50%;
    position:absolute;
    top:3px;
    left:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.4s cubic-bezier(.4,0,.2,1);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.slider-icon{
    font-size:14px;
    color:#f59e0b;
}

body.dark .slider-track{
    background:linear-gradient(135deg,#1e293b,#0f172a);
}

body.dark .slider-thumb{
    left:34px;
    background:#111827;
}

body.dark .slider-icon{
    color:#60a5fa;
}

/* ================= PROFILE ================= */
.profile{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(0,0,0,0.05);
    padding:6px 12px;
    border-radius:20px;
    transition:.3s;
}

.profile:hover{
    background:rgba(0,0,0,0.1);
}

body.dark .profile{
    background:#1e293b;
}

/* ================= LOGOUT ================= */
.logout-btn{
    background:linear-gradient(135deg,#ef4444,#dc2626);
    border:none;
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.3s ease;
    box-shadow:0 6px 15px rgba(220,38,38,0.3);
}

.logout-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(220,38,38,0.5);
}

/* ================= CONTAINER ================= */
.container{
    padding:30px;
}

/* ================= CARDS ================= */
.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    padding:25px;
    border-radius:14px;
    color:white;
    font-size:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:.4s ease;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
}

.card.users{
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);
}

.card.sellers{
    background:linear-gradient(135deg,#10b981,#059669);
}

.card i{
    font-size:35px;
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    background:#ffffff;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:30px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

th{
    background:#1e293b;
    color:white;
    padding:14px;
}

td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
}

tr:hover{
    background:#f1f5f9;
}

/* Dark Table */
body.dark table{
    background:#1e293b;
}

body.dark th{
    background:#0f172a;
}

body.dark td{
    border-bottom:1px solid #334155;
}

body.dark tr:hover{
    background:#334155;
}

/* ================= DELETE BUTTON ================= */
.delete{
    background:#ef4444;
    border:none;
    color:white;
    padding:6px 14px;
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

.delete:hover{
    background:#dc2626;
}

/* Responsive */
@media(max-width:900px){
    .cards{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-user-shield"></i>
        <h2>Admin Dashboard</h2>
    </div>

   <div class="nav-right">

    <!-- Dark Mode Toggle -->
   <button class="theme-toggle" onclick="toggleTheme()">
    <div class="slider-track">
        <div class="slider-thumb">
            <i class="fas fa-sun slider-icon"></i>
        </div>
    </div>
</button>

    <!-- Admin Profile -->
    <div class="profile">
        <i class="fa-solid fa-circle-user"></i>
        <span id="adminName">Admin</span>
    </div>

    <!-- Logout -->
 </button>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

</div>
</div>

<div class="container">

    <!-- CARDS -->
    <div class="cards">
        <div class="card users">
            <div>
                Total Users
                <h2 id="userCount">0</h2>
            </div>
            <i class="fa-solid fa-users"></i>
        </div>

        <div class="card sellers">
            <div>
                Total Sellers
                <h2 id="sellerCount">0</h2>
            </div>
            <i class="fa-solid fa-store"></i>
        </div>
    </div>

    <!-- USERS TABLE -->
    <h2 style="margin-bottom:10px;text-align: center; ">Users Details</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="usersTable"></tbody>
    </table>

    <!-- SELLERS TABLE -->
    <h2 style="margin-bottom:10px;  text-align: center;">Sellers Details</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="sellersTable"></tbody>
    </table>

</div>

<script>

const usersTable = document.getElementById("usersTable");
const sellersTable = document.getElementById("sellersTable");
const userCount = document.getElementById("userCount");
const sellerCount = document.getElementById("sellerCount");

/* ================= SESSION CHECK ================= */
async function checkSession() {
    try {
        const res = await fetch("/me", { credentials: "include" });
        const data = await res.json();

        if (!data.loggedIn || data.user.role !== "admin") {
            window.location.replace("/");
            return;
        }

        document.getElementById("adminName").innerText =
            data.user.full_name;

    } catch (err) {
        window.location.replace("/");
    }
}

/* ================= LOAD ADMIN DATA ================= */
async function loadAdminData() {
    try {
        const res = await fetch("/admin/users", {
            credentials: "include"
        });

        const data = await res.json();

        if (!data.success) {
            alert("Failed to load data");
            return;
        }

        const users = data.users || [];
        const sellers = data.sellers || [];

        usersTable.innerHTML = "";
        sellersTable.innerHTML = "";

        userCount.innerText = users.length;
        sellerCount.innerText = sellers.length;

        /* ===== USERS TABLE ===== */
        users.forEach(user => {
            const row = `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.full_name}</td>
                    <td>${user.email}</td>
                    <td>${user.mobile}</td>
                    <td>
                        <button class="delete"
                        onclick="deleteUser(${user.id})">
                        <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `;
            usersTable.innerHTML += row;
        });

        /* ===== SELLERS TABLE ===== */
        sellers.forEach(seller => {
            const row = `
                <tr>
                    <td>${seller.id}</td>
                    <td>${seller.full_name}</td>
                    <td>${seller.email}</td>
                    <td>${seller.mobile}</td>
                    <td>
                        <button class="delete"
                        onclick="deleteUser(${seller.id})">
                        <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `;
            sellersTable.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

/* ================= DELETE USER ================= */
async function deleteUser(id) {

    if (!confirm("Are you sure you want to delete this account?"))
        return;

    try {
        const res = await fetch(`/admin/user/${id}`, {
            method: "DELETE",
            credentials: "include"
        });

        const data = await res.json();

        if (data.success) {
            loadAdminData();
        } else {
            alert(data.message || "Delete failed");
        }

    } catch (err) {
        alert("Server error");
    }
}

//     });

function logout() {
    window.location.href = "/logout";
}



/* ================= DARK MODE ================= */

document.addEventListener("DOMContentLoaded", () => {

    const saved = localStorage.getItem("sellerTheme");
    const icon = document.querySelector(".slider-icon");

    if (saved === "dark") {
        document.body.classList.add("dark");

        if (icon) {
            icon.classList.remove("fa-sun");
            icon.classList.add("fa-moon");
        }
    }

    loadSales();  // <-- fixed (removed 's')

});





function toggleTheme() {

    const icon = document.querySelector(".slider-icon");

    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {

        if (icon) {
            icon.classList.remove("fa-sun");
            icon.classList.add("fa-moon");
        }

        localStorage.setItem("sellerTheme", "dark");

    } else {

        if (icon) {
            icon.classList.remove("fa-moon");
            icon.classList.add("fa-sun");
        }

        localStorage.setItem("sellerTheme", "light");
    }
}


window.addEventListener("scroll", function () {
    const navbar = document.querySelector(".navbar");

    if (window.scrollY > 50) {
        navbar.classList.add("scrolled");
        document.body.style.paddingTop = navbar.offsetHeight + "px";
    } else {
        navbar.classList.remove("scrolled");
        document.body.style.paddingTop = "0px";
    }
});



/* ================= INITIAL LOAD ================= */
checkSession();
loadAdminData();
</script>



</body>
</html>
