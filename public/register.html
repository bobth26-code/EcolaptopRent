<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crescendo - Login / Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1F3C73,#2E4A87,#4C6FB3);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    color:#fff;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.toggle{
    display:flex;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    margin-bottom:25px;
    overflow:hidden;
}

.toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:transparent;
    color:#fff;
    cursor:pointer;
    font-weight:600;
}

.toggle button.active{
    background:#fff;
    color:#1F3C73;
}

form{
    display:none;
    flex-direction:column;
}

form.active{
    display:flex;
}

input, select{
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    background:#fff;
    color:#1F3C73;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#e5e7eb;
}

pre{
    color:#ffdada;
    margin-top:10px;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<!-- 🔐 /me CHECK (UNCHANGED LOGIC) -->
<script>
fetch("/me", { credentials: "include", cache: "no-store" })
.then(res => res.json())
.then(data => {
    if (data.loggedIn) {
        if (data.user.role === "seller") {
            window.location.replace("/seller_dashboard.html");
        } else if (data.user.role === "admin") {
            window.location.replace("/admin_dashboard.html");
        } else {
            window.location.replace("/homepage.html");
        }
    }
});
</script>

<div class="container">
<h2>Crescendo</h2>

<div class="toggle">
    <button id="loginBtn" class="active">Login</button>
    <button id="registerBtn">Register</button>
</div>

<!-- LOGIN FORM (Your existing login logic assumed working) -->
<form id="loginForm" class="active">
    <input id="login_email" type="email" placeholder="Email" required>
    <input id="login_password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <pre id="loginOutput"></pre>
</form>

<!-- REGISTER FORM (YOUR CODE – NOT MODIFIED) -->
<form id="registerForm">
    <select id="role" required>
        <option value="">Select Role</option>
        <option value="user">User</option>
        <option value="seller">Seller</option>
    </select>

    <input id="full_name" placeholder="Full Name" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="mobile" placeholder="Mobile" required>
    <input id="password" type="password" placeholder="Password" required>

    <button type="submit">Register</button>
    <pre id="output"></pre>
</form>

</div>

<script>
const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

loginBtn.onclick = () => {
    loginBtn.classList.add("active");
    registerBtn.classList.remove("active");
    loginForm.classList.add("active");
    registerForm.classList.remove("active");
};

registerBtn.onclick = () => {
    registerBtn.classList.add("active");
    loginBtn.classList.remove("active");
    registerForm.classList.add("active");
    loginForm.classList.remove("active");
};

/* REGISTER LOGIC — EXACTLY SAME AS YOU GAVE */
const form = document.getElementById("registerForm");
const output = document.getElementById("output");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    output.textContent = "";

    const role = document.getElementById("role").value;

    if (!role) {
        output.textContent = "❌ Please select a role";
        return;
    }

    const body = {
        role,
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        password: document.getElementById("password").value
    };

    try {
        const res = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (data.success) {

            if (data.redirect) {
                window.location.replace(data.redirect);
                return;
            }

            if (role === "seller") {
                window.location.replace("/seller_dashboard.html");
            } else {
                window.location.replace("/homepage.html");
            }
        } else {
            output.textContent = "❌ " + (data.error || "Registration failed");
        }

    } catch (err) {
        output.textContent = "❌ Server error. Try again.";
    }
});
</script>

</body>
</html>
