<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Segoe UI;
            background: #f1f5f9;
            margin: 0;
        }


        /* ===== NAVBAR (SAME AS DASHBOARD) ===== */
        .navbar {
            width: 90%;
            margin: 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            background: #ffffff;
            color: #111827;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.35s ease;
            position: relative;
            z-index: 1000;
        }

        .navbar.scrolled {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            margin: 0;
            border-radius: 0;
            padding: 12px 30px;
            /* slightly shrink */
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap');



        body.dark .navbar {
            /* background: #111827; */
            background: #1f2937;
            color: #ffffff;
        }

        .seller-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .seller-icon {
            color: #2563eb;
            font-size: 18px;
        }

        /* After Scroll in Dark Mode */
        body.dark .navbar.scrolled {
            background: #0f172a;

            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
        }







        .logo {
            width: 55px;
            border-radius: 10px;
        }

        .seller-name {
            font-weight: 600;
        }


        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-center {
            display: flex;
            gap: 15px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            background: #1f2937;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .nav-btn.active {
            background: #2563eb;
        }



        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.3);
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.5);
        }

        .logout-btn:active {
            transform: scale(0.96);
        }

        .logout-btn i {
            margin-right: 6px;
        }


        /* ===== TOGGLE ===== */
        .theme-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* Track */
        .slider-track {
            width: 70px;
            height: 36px;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            border-radius: 50px;
            position: relative;
            margin-left: 70px;
            transition: 0.4s ease;
            box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        /* Thumb */
        .slider-thumb {
            width: 30px;
            height: 30px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Icon */
        .slider-icon {
            font-size: 14px;
            color: #f59e0b;
            transition: 0.3s ease;
        }

        .slider-thumb {
            transition: 0.4s cubic-bezier(.4, 0, .2, 1);
        }

        .slider-thumb i {
            transition: 0.4s ease;
        }

        body.dark .slider-thumb i {
            transform: rotate(360deg);
        }

        /* 🌙 DARK MODE STYLE */
        body.dark .slider-track {
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        body.dark .slider-thumb {
            left: 37px;
            background: #111827;
        }

        body.dark .slider-icon {
            color: #60a5fa;
        }

    .container{
max-width:1000px;
margin:40px auto;
padding:30px;
background:#ffffff;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* Heading */
.container h2{
margin-bottom:20px;
font-size:24px;
font-weight:600;
}

/* Form layout */
.product-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:40px;
}

/* Full width fields */
.product-form textarea,
.product-form button{
grid-column:span 2;
}

/* Inputs */
.product-form input,
.product-form select,
.product-form textarea{
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
outline:none;
transition:0.2s;
}

/* Focus effect */
.product-form input:focus,
.product-form select:focus,
.product-form textarea:focus{
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.1);
}

/* Textarea */
.product-form textarea{
min-height:80px;
resize:vertical;
}

/* Button */
.product-form button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.product-form button:hover{
background:#1e40af;
}

/* Product list grid */
#productList{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* Product card */
.product-card{
background:#ffffff;
border-radius:10px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-4px);
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}body.dark .container{
background:#1f2937;
color:#f3f4f6;
}

body.dark .product-form input,
body.dark .product-form select,
body.dark .product-form textarea{
background:#111827;
border:1px solid #374151;
color:#f3f4f6;
}

body.dark .product-card{
background:#111827;
color:#f3f4f6;
}
        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-edit {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-delete {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* ===== DARK MODE ===== */

        body.dark {
            background: #0f172a;
            color: #f1f5f9;
        }

        /* NAVBAR */

        body.dark .navbar {
            background: #1f2937;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        /* PRODUCT FORM */

        body.dark .product-form {
            background: #1e293b;
        }

        /* INPUTS */

        body.dark input,
        body.dark textarea,
        body.dark select {
            background: #334155;
            border: 1px solid #475569;
            color: #fff;
        }

        /* PRODUCT CARD */

        body.dark .product-card {
            background: #1e293b;
            color: #f1f5f9;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        /* SMALL TEXT */

        body.dark .small {
            color: #94a3b8;
        }

        /* BUTTONS */

        body.dark .btn-edit {
            background: #2563eb;
        }

        body.dark .btn-delete {
            background: #dc2626;
        }

        /* DROPDOWN */

        body.dark .dropdown {
            background: #1f2937;
            border: 1px solid #374151;
        }

        body.dark .dropdown a {
            color: #f1f5f9;
        }
    </style>

<script>

const BASE_URL = "https://ecolaptoprent.onrender.com";
document.addEventListener("DOMContentLoaded", () => {

    /* ================= AUTH CHECK ================= */

    fetch(BASE_URL + "/me", { credentials: "include" })
        .then(r => r.json())
        .then(d => {

            if (!d.loggedIn || d.user.role !== "seller") {
                location = "/";
                return;
            }

            const sellerName = document.getElementById("sellerName");
            if (sellerName) {
                sellerName.textContent = d.user.full_name;
            }

        });

    /* ================= LOAD PRODUCTS ================= */

    async function loadProducts() {

        const r = await fetch(BASE_URL + "/seller/products", {
            credentials: "include"
        });

        const text = await r.text();

        let d;
        try {
            d = JSON.parse(text);
        } catch (e) {
            console.error("❌ Not JSON:", text);
            return;
        }

        const box = document.getElementById("productList");
        box.innerHTML = "";

        if (!d.success) {
            box.innerHTML = "No products";
            return;
        }

        d.products.forEach(p => box.innerHTML += `
<div class="product-card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.description}</p>
<p><b>Category:</b> ${p.category}</p>
₹${p.price} | Stock ${p.stock}
<div class="product-actions">
<button class="btn-edit" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
<button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
</div>
</div>
`);
    }

    /* ================= SAVE PRODUCT ================= */

    document.getElementById("productForm").onsubmit = async function (e) {

        e.preventDefault();

        const id = document.getElementById("productId").value;

        const body = {
            name: document.getElementById("name").value,
            description: document.getElementById("description").value,
            category: document.getElementById("category").value,
            price: document.getElementById("price").value,
            stock: document.getElementById("stock").value,
            image: document.getElementById("image").value
        };

        const url = id
            ? BASE_URL + "/seller/product/" + id
            : BASE_URL + "/seller/product";

        const method = id ? "PUT" : "POST";

        await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(body)
        });

        this.reset();
        document.getElementById("productId").value = "";

        loadProducts();
    };

    /* ================= DELETE ================= */

    window.deleteProduct = async function (id) {

        if (!confirm("Delete product?")) return;

        await fetch(BASE_URL + "/seller/product/" + id, {
            method: "DELETE",
            credentials: "include"
        });

        loadProducts();
    }

    /* ================= EDIT ================= */

    window.editProduct = function (p) {
        document.getElementById("productId").value = p.id;
        document.getElementById("name").value = p.name;
        document.getElementById("description").value = p.description;
        document.getElementById("category").value = p.category;
        document.getElementById("price").value = p.price;
        document.getElementById("stock").value = p.stock;
        document.getElementById("image").value = p.image;
        window.scrollTo(0, 0);
    };

    /* ================= DARK MODE LOAD ================= */

    const saved = localStorage.getItem("sellerTheme");

    if (saved === "dark") {
        document.body.classList.add("dark");

        const icon = document.querySelector(".slider-icon");
        if (icon) {
            icon.classList.remove("fa-sun");
            icon.classList.add("fa-moon");
        }
    }

    /* ================= INIT ================= */

    loadProducts();

});

/* ================= TOGGLE THEME ================= */

function toggleTheme() {

    document.body.classList.toggle("dark");

    const icon = document.querySelector(".slider-icon");

    if (document.body.classList.contains("dark")) {
        icon.classList.remove("fa-sun");
        icon.classList.add("fa-moon");
        localStorage.setItem("sellerTheme", "dark");
    } else {
        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
        localStorage.setItem("sellerTheme", "light");
    }
}

/* ================= LOGOUT ================= */

function logout() {
    fetch(BASE_URL + "/logout", { credentials: "include" })
        .then(() => {
            window.location.href = "/index.html";
        });
}

</script>
