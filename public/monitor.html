<!DOCTYPE html>
<html>

<head>
<title>Monitors</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Segoe UI;
background:#f1f5f9;
margin:0;
}

.navbar{
width:90%;
margin:30px auto;
background:#fff;
padding:15px 30px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:#333;
font-weight:500;
}

.search{
padding:8px 15px;
border-radius:20px;
border:1px solid #ddd;
}

/* PRODUCTS */

.container{
width:90%;
margin:auto;
display:flex;
gap:30px;
flex-wrap:wrap;
}

.card{
width:260px;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
font-weight:bold;
margin-bottom:15px;
}

.cart-btn{
width:100%;
background:#2563eb;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.cart-btn:hover{
background:#1e40af;
}

</style>
</head>

<body>
<script>

fetch("/me", { credentials: "include" })
.then(r => r.json())
.then(d => {

    if (!d.loggedIn || d.user.role !== "user") {
        window.location.href = "index.html";
    }

})
.catch(() => {
    window.location.href = "index.html";
});

</script>
<div class="navbar">

<div class="nav-links">

<a href="homepage.html">Home</a>
<a href="laptop.html">Laptop</a>
<a href="monitor.html"><b>Monitors</b></a>
<a href="keyboard.html">Keyboard</a>
<a href="projector.html">Projector</a>

</div>

<input class="search" placeholder="Search monitor...">

</div>


<div class="container" id="products"></div>

<script>

async function loadMonitors(){

const res = await fetch("/monitors");
const data = await res.json();

const box = document.getElementById("products");

box.innerHTML="";

if(!data.success || data.products.length === 0){
box.innerHTML = "<p>No monitors available</p>";
return;
}

data.products.forEach(p => {

box.innerHTML += `
<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>${p.description}</p>

<div class="price">₹${p.price}</div>

<button class="cart-btn" onclick="addToCart(${p.id})">
🛒 Add to Cart
</button>

</div>
`;

});

}

async function addToCart(id){

const res = await fetch("/cart",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
credentials:"include",
body:JSON.stringify({product_id:id})
});

const data = await res.json();

if(data.success){
alert("Added to cart");
}

}

loadMonitors();

</script>

</body>
</html>
