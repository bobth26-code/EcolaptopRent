<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Login / Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1F3C73,#2E4A87,#4C6FB3);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    color:#fff;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.toggle{
    display:flex;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    margin-bottom:25px;
    overflow:hidden;
}

.toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:transparent;
    color:#fff;
    cursor:pointer;
    font-weight:600;
}

.toggle button.active{
    background:#fff;
    color:#1F3C73;
}

form{
    display:none;
    flex-direction:column;
}

form.active{
    display:flex;
}

input, select{
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    background:#fff;
    color:#1F3C73;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}

/* button:hover{
    background:#e5e7eb;
} */

pre{
    color:#ffdada;
    margin-top:10px;
    white-space:pre-wrap;
}.input-effect {
    position: relative;
    margin: 20px 0;
}

.effect-22 {
    width: 100%;
    border: 1px solid #ccc;
    padding: 12px 15px;
    background: transparent;
    font-size: 14px;
}

.effect-22 ~ .focus-bg {
    position: absolute;
    left: 0;
    top: 0;
    width: 0;
    height: 100%;
    background-color: transparent;
    transition: 0.3s;
    z-index: -1;
}

.effect-22:focus ~ .focus-bg,
.has-content.effect-22 ~ .focus-bg {
    width: 100%;
    /* background-color: #ededed; */
}

.effect-22 ~ label {
    position: absolute;
    left: 15px;
    top: 12px;
    color: #aaa;
    transition: 0.3s;
    pointer-events: none;
}

.effect-22:focus ~ label,
.has-content.effect-22 ~ label {
    top: -10px;
    left: 10px;
    font-size: 12px;
    color: #fff;
    /* background: #fff; */
    padding: 0 5px;
}

.forgot-link {
    text-align: right;
    margin-top: 8px;
    margin-bottom: 15px;
}

.forgot-link a {
    color: #fff;
    text-decoration: none;
    font-size: 0.9rem;
    opacity: 0.85;
    transition: opacity 0.3s;
}

.forgot-link a:hover {
    opacity: 1;
    text-decoration: underline;
}

</style>
</head>
<body>

<!-- 🔐 /me CHECK -->
<script>
fetch("/me", { credentials: "include", cache: "no-store" })
.then(res => res.json())
.then(data => {
    if (data.loggedIn) {
        if (data.user.role === "seller") {
            window.location.replace("/seller_dashboard.html");
        } else if (data.user.role === "admin") {
            window.location.replace("/admin_dashboard.html");
        } else {
            window.location.replace("/homepage.html");
        }
    }
});
</script>

<div class="container">
<h2>LeaseLogic</h2>

<div class="toggle">
    <button id="loginBtn" class="active">Login</button>
    <button id="registerBtn">Register</button>
</div>

<!-- LOGIN -->
<form id="loginForm" class="active">

    <div class="input-effect">
        <input id="login_email" class="effect-22" type="email" required>
        <label>Email</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="login_password" class="effect-22" type="password" required>
        <label>Password</label>
        <span class="focus-bg"></span>
    </div>

    <button type="submit">Login</button>
    <div class="forgot-link">
        <a href="/forget-password.html">Forgot password?</a>
    </div>
    <pre id="loginOutput"></pre>
</form>

<!-- REGISTER -->
<form id="registerForm">

    <select id="role" required>
        <option value="">Select Role</option>
        <option value="user">User</option>
        <option value="seller">Seller</option>
    </select>

    <div class="input-effect">
        <input id="full_name" class="effect-22" required>
        <label>Full Name</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="email" class="effect-22" type="email" required>
        <label>Email</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="mobile" class="effect-22" required>
        <label>Mobile</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="password" class="effect-22" type="password" required>
        <label>Password</label>
        <span class="focus-bg"></span>
    </div>

    <button type="submit">Register</button>
    <pre id="output"></pre>
</form>

</div>

<script>
const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

loginBtn.onclick = () => {
    loginBtn.classList.add("active");
    registerBtn.classList.remove("active");
    loginForm.classList.add("active");
    registerForm.classList.remove("active");
};

registerBtn.onclick = () => {
    registerBtn.classList.add("active");
    loginBtn.classList.remove("active");
    registerForm.classList.add("active");
    loginForm.classList.remove("active");
};
document.querySelectorAll(".effect-22").forEach(input => {
    input.addEventListener("blur", function () {
        if (this.value !== "") {
            this.classList.add("has-content");
        } else {
            this.classList.remove("has-content");
        }
    });

    input.addEventListener("focus", function () {
        this.classList.add("has-content");
    });
});
/* LOGIN */
loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const output = document.getElementById("loginOutput");
    output.textContent = "";

    const body = {
        email: document.getElementById("login_email").value.trim(),
        password: document.getElementById("login_password").value
    };

    try {
        const res = await fetch("/login", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            credentials:"include",
            body:JSON.stringify(body)
        });

        const text = await res.text();
        let data;

        try { data = JSON.parse(text); }
        catch { output.textContent="Server error"; return; }

        if (data.success) {
            
            window.location.href = data.redirect;
        } else {
            output.textContent = "❌ " + (data.error || "Invalid credentials");
        }

    } catch {
        output.textContent = "❌ Server not responding";
    }
});

/* REGISTER (NO LOGIC CHANGE) */
registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const output = document.getElementById("output");
    output.textContent = "";

    const role = document.getElementById("role").value;

    if (!role) {
        output.textContent = "❌ Please select a role";
        return;
    }

    const body = {
        role,
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        password: document.getElementById("password").value
    };

    try {
        const res = await fetch("/register", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            credentials:"include",
            body:JSON.stringify(body)
        });

        const data = await res.json();

        if (data.success) {

            

            if (data.redirect) {
                window.location.replace(data.redirect);
                return;
            }

            if (role === "seller") {
                window.location.replace("/seller_dashboard.html");
            } else {
                window.location.replace("/homepage.html");
            }

        } else {
            output.textContent = "❌ " + (data.error || "Registration failed");
        }

    } catch {
        output.textContent = "❌ Server error. Try again.";
    }
});
</script>

</body>
</html>
