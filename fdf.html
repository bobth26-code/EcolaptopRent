<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeaseLogic</title>

<style>
body {
    font-family: Arial;
    padding: 40px;
}

.container {
    max-width: 400px;
    margin: auto;
}

.toggle button {
    padding: 10px;
    margin: 5px;
}

form {
    display: none;
}

form.active {
    display: block;
}

/* ===== ONLY effect-22 CSS ===== */

.input-effect {
    position: relative;
    margin: 20px 0;
}

.effect-22 {
    width: 100%;
    border: 1px solid #ccc;
    padding: 10px 15px;
    background: transparent;
}

.effect-22:focus {
    outline: none;
}

.effect-22 ~ .focus-bg {
    position: absolute;
    left: 0;
    top: 0;
    width: 0;
    height: 100%;
    background: #ededed;
    transition: 0.4s;
    z-index: -1;
}

.effect-22:focus ~ .focus-bg,
.effect-22.has-content ~ .focus-bg {
    width: 100%;
}

.effect-22 ~ label {
    position: absolute;
    left: 15px;
    top: 12px;
    color: #aaa;
    transition: 0.3s;
    pointer-events: none;
    background: #fff;
    padding: 0 5px;
}

.effect-22:focus ~ label,
.effect-22.has-content ~ label {
    top: -10px;
    left: 10px;
    font-size: 12px;
    color: #333;
}
</style>

</head>

<body>

<div class="container">
<h2>LeaseLogic</h2>

<div class="toggle">
    <button id="loginBtn" class="active">Login</button>
    <button id="registerBtn">Register</button>
</div>

<!-- LOGIN (UNCHANGED) -->
<form id="loginForm" class="active">
    <input id="login_email" type="email" placeholder="Email" required>
    <input id="login_password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <pre id="loginOutput"></pre>
</form>

<!-- REGISTER (only inputs wrapped) -->
<form id="registerForm">

    <select id="role" required>
        <option value="">Select Role</option>
        <option value="user">User</option>
        <option value="seller">Seller</option>
    </select>

    <div class="input-effect">
        <input id="full_name" class="effect-22" type="text" placeholder="" required>
        <label>Full Name</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="email" class="effect-22" type="email" placeholder="" required>
        <label>Email</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="mobile" class="effect-22" type="text" placeholder="" required>
        <label>Mobile</label>
        <span class="focus-bg"></span>
    </div>

    <div class="input-effect">
        <input id="password" class="effect-22" type="password" placeholder="" required>
        <label>Password</label>
        <span class="focus-bg"></span>
    </div>

    <button type="submit">Register</button>
    <pre id="output"></pre>
</form>

</div>

<script>
// ===== YOUR EXISTING LOGIC (UNCHANGED) =====

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

loginBtn.onclick = () => {
    loginForm.classList.add("active");
    registerForm.classList.remove("active");
};

registerBtn.onclick = () => {
    registerForm.classList.add("active");
    loginForm.classList.remove("active");
};

// ===== YOUR EXISTING effect-22 JS (ASSUMED ALREADY PRESENT) =====
document.querySelectorAll(".effect-22").forEach(input => {
    input.addEventListener("input", function() {
        if (this.value.trim() !== "") {
            this.classList.add("has-content");
        } else {
            this.classList.remove("has-content");
        }
    });
});
</script>

</body>
</html>
